<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go Agent Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg: #0f0f13;
  --bg-chat: #16161d;
  --bg-msg-user: #2563eb;
  --bg-msg-ai: #1e1e2a;
  --bg-tool: #1a1a25;
  --bg-input: #1c1c28;
  --border: #2a2a3a;
  --text: #e4e4ed;
  --text-dim: #8888a0;
  --accent: #6366f1;
  --accent-glow: rgba(99,102,241,0.15);
  --green: #22c55e;
  --orange: #f59e0b;
  --red: #ef4444;
}

body {
  font-family: 'Inter', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  display: flex;
}

/* ---- 侧边栏 ---- */
.sidebar {
  width: 260px;
  background: var(--bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}

.sidebar-header {
  padding: 20px 16px 12px;
  border-bottom: 1px solid var(--border);
}

.sidebar-header h1 {
  font-size: 16px;
  font-weight: 600;
  color: var(--accent);
  display: flex;
  align-items: center;
  gap: 8px;
}

.sidebar-header h1::before {
  content: '⚡';
}

.new-chat-btn {
  display: flex;
  align-items: center;
  gap: 8px;
  width: 100%;
  margin-top: 12px;
  padding: 10px 12px;
  background: var(--accent-glow);
  border: 1px dashed var(--accent);
  border-radius: 8px;
  color: var(--accent);
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
}

.new-chat-btn:hover {
  background: rgba(99,102,241,0.25);
  border-style: solid;
}

.session-list {
  flex: 1;
  overflow-y: auto;
  padding: 8px;
}

.session-item {
  padding: 10px 12px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text-dim);
  transition: all 0.15s;
  margin-bottom: 2px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.session-item:hover { background: rgba(255,255,255,0.04); color: var(--text); }
.session-item.active { background: rgba(99,102,241,0.12); color: var(--text); }

.session-item .dot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--text-dim);
  flex-shrink: 0;
}

.session-item.active .dot { background: var(--accent); }

/* ---- 主聊天区 ---- */
.chat-area {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
}

.chat-header {
  padding: 14px 24px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  color: var(--text-dim);
  display: flex;
  align-items: center;
  gap: 8px;
}

.chat-header .session-id {
  font-family: 'JetBrains Mono', monospace;
  color: var(--accent);
  font-size: 12px;
  background: var(--accent-glow);
  padding: 2px 8px;
  border-radius: 4px;
}

.messages {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.messages::-webkit-scrollbar { width: 6px; }
.messages::-webkit-scrollbar-track { background: transparent; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* 消息气泡 */
.msg {
  max-width: 80%;
  padding: 12px 16px;
  border-radius: 12px;
  font-size: 14px;
  line-height: 1.6;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

.msg.user {
  align-self: flex-end;
  background: var(--bg-msg-user);
  border-bottom-right-radius: 4px;
  color: #fff;
}

.msg.ai {
  align-self: flex-start;
  background: var(--bg-msg-ai);
  border-bottom-left-radius: 4px;
  border: 1px solid var(--border);
}

.msg.ai pre {
  background: #12121a;
  padding: 10px 12px;
  border-radius: 6px;
  overflow-x: auto;
  margin: 8px 0;
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  line-height: 1.5;
}

.msg.ai code {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  background: rgba(255,255,255,0.06);
  padding: 1px 5px;
  border-radius: 3px;
}

/* 工具调用 */
.tool-block {
  align-self: flex-start;
  max-width: 85%;
  background: var(--bg-tool);
  border: 1px solid var(--border);
  border-radius: 10px;
  font-size: 12px;
  overflow: hidden;
  animation: fadeIn 0.2s ease;
}

.tool-header {
  padding: 8px 12px;
  display: flex;
  align-items: center;
  gap: 6px;
  font-weight: 500;
  color: var(--orange);
  border-bottom: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  cursor: pointer;
  user-select: none;
}

.tool-header .icon { font-size: 14px; }

.tool-body {
  padding: 10px 12px;
  font-family: 'JetBrains Mono', monospace;
  color: var(--text-dim);
  max-height: 200px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-break: break-all;
}

.tool-body.collapsed { display: none; }

/* 思考状态 */
.thinking {
  align-self: flex-start;
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 13px;
  color: var(--text-dim);
  padding: 8px 0;
  animation: fadeIn 0.2s ease;
}

.thinking .spinner {
  width: 16px; height: 16px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* 输入区 */
.input-area {
  padding: 16px 24px 20px;
  border-top: 1px solid var(--border);
  background: var(--bg);
}

.input-row {
  display: flex;
  gap: 10px;
  align-items: flex-end;
}

.input-row textarea {
  flex: 1;
  background: var(--bg-input);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 16px;
  color: var(--text);
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  resize: none;
  min-height: 44px;
  max-height: 160px;
  outline: none;
  transition: border-color 0.2s;
}

.input-row textarea:focus { border-color: var(--accent); }

.input-row textarea::placeholder { color: var(--text-dim); }

.send-btn {
  width: 44px; height: 44px;
  background: var(--accent);
  border: none;
  border-radius: 10px;
  color: #fff;
  font-size: 18px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  flex-shrink: 0;
}

.send-btn:hover { background: #5558e6; transform: scale(1.04); }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

/* 空状态 */
.empty-state {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: var(--text-dim);
  gap: 12px;
}

.empty-state .icon { font-size: 48px; opacity: 0.3; }
.empty-state p { font-size: 14px; }

/* 响应式 */
@media (max-width: 768px) {
  .sidebar { width: 200px; }
  .msg { max-width: 92%; }
}

@media (max-width: 600px) {
  .sidebar { display: none; }
}
</style>
</head>
<body>

<!-- 侧边栏 -->
<div class="sidebar">
  <div class="sidebar-header">
    <h1>Go Agent</h1>
    <button class="new-chat-btn" onclick="newSession()">+ 新建会话</button>
  </div>
  <div class="session-list" id="sessionList"></div>
</div>

<!-- 聊天区 -->
<div class="chat-area">
  <div class="chat-header">
    会话：<span class="session-id" id="currentSessionId">—</span>
    <span id="statusDot" style="margin-left:auto"></span>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state">
      <div class="icon">💬</div>
      <p>点击「新建会话」或左侧已有会话开始对话</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="输入消息... (Enter 发送，Shift+Enter 换行)" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()" disabled>↑</button>
    </div>
  </div>
</div>

<script>
const API = location.origin;
let currentSession = null;
let sessions = JSON.parse(localStorage.getItem('agent_sessions') || '[]');
let sending = false;

// ---- 会话管理 ----

function genId() {
  return 's_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
}

function newSession() {
  const id = genId();
  const session = { id, title: '新会话', messages: [], created: Date.now() };
  sessions.unshift(session);
  saveSessions();
  switchSession(id);
}

function switchSession(id) {
  currentSession = sessions.find(s => s.id === id);
  if (!currentSession) return;
  document.getElementById('currentSessionId').textContent = id;
  renderSessions();
  renderMessages();
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('input').focus();
}

function saveSessions() {
  localStorage.setItem('agent_sessions', JSON.stringify(sessions));
}

function renderSessions() {
  const el = document.getElementById('sessionList');
  el.innerHTML = sessions.map(s => `
    <div class="session-item ${s.id === currentSession?.id ? 'active' : ''}" onclick="switchSession('${s.id}')">
      <span class="dot"></span>
      <span>${escHtml(s.title)}</span>
    </div>
  `).join('');
}

// ---- 消息渲染 ----

function renderMessages() {
  const el = document.getElementById('messages');
  if (!currentSession || currentSession.messages.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="icon">💬</div><p>开始你的对话</p></div>`;
    return;
  }
  el.innerHTML = currentSession.messages.map(renderMsg).join('');
  el.scrollTop = el.scrollHeight;
}

function renderMsg(m) {
  switch (m.type) {
    case 'user':
      return `<div class="msg user">${escHtml(m.text)}</div>`;
    case 'message':
      return `<div class="msg ai">${formatText(m.text)}</div>`;
    case 'tool_call':
      return `<div class="tool-block">
        <div class="tool-header" onclick="this.nextElementSibling.classList.toggle('collapsed')">
          <span class="icon">🔧</span> ${escHtml(m.name)}
        </div>
        <div class="tool-body">${escHtml(typeof m.args === 'string' ? m.args : JSON.stringify(m.args, null, 2))}</div>
      </div>`;
    case 'tool_result':
      return `<div class="tool-block">
        <div class="tool-header" onclick="this.nextElementSibling.classList.toggle('collapsed')" style="color:var(--green)">
          <span class="icon">✅</span> ${escHtml(m.name)} 结果
        </div>
        <div class="tool-body collapsed">${escHtml(m.result)}</div>
      </div>`;
    case 'error':
      return `<div class="msg ai" style="border-color:var(--red);color:var(--red)">❌ ${escHtml(m.text)}</div>`;
    default:
      return '';
  }
}

function formatText(text) {
  // 简单 markdown: 代码块、行内代码、换行
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${escHtml(code.trim())}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- 发送消息 ----

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || !currentSession || sending) return;

  sending = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  autoResize(input);

  // 添加用户消息
  currentSession.messages.push({ type: 'user', text });

  // 首条消息时更新标题
  if (currentSession.messages.length === 1) {
    currentSession.title = text.slice(0, 30) + (text.length > 30 ? '...' : '');
    renderSessions();
  }

  renderMessages();
  saveSessions();

  // 添加 thinking 指示
  const msgEl = document.getElementById('messages');
  const thinkEl = document.createElement('div');
  thinkEl.className = 'thinking';
  thinkEl.id = 'thinking';
  thinkEl.innerHTML = '<div class="spinner"></div> 思考中...';
  msgEl.appendChild(thinkEl);
  msgEl.scrollTop = msgEl.scrollHeight;

  try {
    const resp = await fetch(API + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: currentSession.id, message: text }),
    });

    if (!resp.ok) {
      throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('data:')) {
          const dataStr = line.slice(5).trim();
          if (!dataStr) continue;
          try {
            const event = JSON.parse(dataStr);
            handleEvent(event);
          } catch (e) {
            // 忽略解析错误
          }
        }
      }
    }
  } catch (e) {
    currentSession.messages.push({ type: 'error', text: e.message });
  }

  // 清除 thinking
  const t = document.getElementById('thinking');
  if (t) t.remove();

  renderMessages();
  saveSessions();
  sending = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function handleEvent(event) {
  const t = document.getElementById('thinking');

  switch (event.type) {
    case 'thinking':
      if (t) t.innerHTML = `<div class="spinner"></div> ${escHtml(event.data?.step || '思考中...')}`;
      break;
    case 'tool_call':
      currentSession.messages.push({ type: 'tool_call', name: event.data?.name, args: event.data?.args });
      if (t) t.innerHTML = `<div class="spinner"></div> 执行 ${escHtml(event.data?.name)}...`;
      renderMessages();
      // 重新追加 thinking
      const msgEl1 = document.getElementById('messages');
      if (t) msgEl1.appendChild(t);
      msgEl1.scrollTop = msgEl1.scrollHeight;
      break;
    case 'tool_result':
      currentSession.messages.push({ type: 'tool_result', name: event.data?.name, result: event.data?.result });
      renderMessages();
      const msgEl2 = document.getElementById('messages');
      if (t) msgEl2.appendChild(t);
      msgEl2.scrollTop = msgEl2.scrollHeight;
      break;
    case 'message':
      currentSession.messages.push({ type: 'message', text: event.data?.content });
      renderMessages();
      break;
    case 'error':
      currentSession.messages.push({ type: 'error', text: event.data?.error });
      renderMessages();
      break;
    case 'done':
      break;
  }
}

// ---- 输入框自适应高度 ----

const input = document.getElementById('input');

input.addEventListener('input', () => autoResize(input));
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

// ---- 初始化 ----

renderSessions();
if (sessions.length > 0) {
  switchSession(sessions[0].id);
} else {
  renderMessages();
}
</script>
</body>
</html>
