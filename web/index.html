<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Go Agent Chat</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 侧边栏 -->
<div class="sidebar">
  <div class="sidebar-header">
    <h1>Go Agent</h1>
    <button class="new-chat-btn" onclick="newSession()">+ 新建会话</button>
  </div>
  <div class="session-list" id="sessionList"></div>
</div>

<!-- 聊天区 -->
<div class="chat-area">
  <div class="chat-header">
    会话：<span class="session-id" id="currentSessionId">—</span>
    <span id="statusDot" style="margin-left:auto"></span>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state">
      <div class="icon">💬</div>
      <p>点击「新建会话」或左侧已有会话开始对话</p>
    </div>
  </div>

  <div class="input-area">
    <div class="input-row">
      <textarea id="input" placeholder="输入消息... (Enter 发送，Shift+Enter 换行)" rows="1"></textarea>
      <button class="send-btn" id="sendBtn" onclick="send()" disabled>↑</button>
    </div>
  </div>
</div>

<script>
const API = location.origin;
let currentSession = null;
let sessions = JSON.parse(localStorage.getItem('agent_sessions') || '[]');
let sending = false;

// ---- 会话管理 ----

function genId() {
  return 's_' + Date.now().toString(36) + '_' + Math.random().toString(36).slice(2, 6);
}

function newSession() {
  const id = genId();
  const session = { id, title: '新会话', messages: [], created: Date.now() };
  sessions.unshift(session);
  saveSessions();
  switchSession(id);
}

function switchSession(id) {
  currentSession = sessions.find(s => s.id === id);
  if (!currentSession) return;
  document.getElementById('currentSessionId').textContent = id;
  renderSessions();
  renderMessages();
  document.getElementById('sendBtn').disabled = false;
  document.getElementById('input').focus();
}

function saveSessions() {
  localStorage.setItem('agent_sessions', JSON.stringify(sessions));
}

function renderSessions() {
  const el = document.getElementById('sessionList');
  el.innerHTML = sessions.map(s => `
    <div class="session-item ${s.id === currentSession?.id ? 'active' : ''}" onclick="switchSession('${s.id}')">
      <span class="dot"></span>
      <span>${escHtml(s.title)}</span>
    </div>
  `).join('');
}

// ---- 消息渲染 ----

function renderMessages() {
  const el = document.getElementById('messages');
  if (!currentSession || currentSession.messages.length === 0) {
    el.innerHTML = `<div class="empty-state"><div class="icon">💬</div><p>开始你的对话</p></div>`;
    return;
  }
  el.innerHTML = currentSession.messages.map(renderMsg).join('');
  el.scrollTop = el.scrollHeight;
}

function renderMsg(m) {
  switch (m.type) {
    case 'user':
      return `<div class="msg user">${escHtml(m.text)}</div>`;
    case 'message':
      return `<div class="msg ai">${formatText(m.text)}</div>`;
    case 'thinking':
      return `<div class="tool-block"><div class="tool-header" data-toggle style="color:var(--text-dim)"><span class="icon">💭</span> ${escHtml(m.step || '思考中')}<span class="arrow">▶</span></div><div class="tool-body">${escHtml(m.detail || '')}</div></div>`;
    case 'tool_call':
      return `<div class="tool-block"><div class="tool-header" data-toggle><span class="icon">🔧</span> ${escHtml(m.name)}<span class="arrow">▶</span></div><div class="tool-body">${escHtml(typeof m.args === 'string' ? m.args : JSON.stringify(m.args, null, 2))}</div></div>`;
    case 'tool_result':
      return `<div class="tool-block"><div class="tool-header" data-toggle style="color:var(--green)"><span class="icon">✅</span> ${escHtml(m.name)} 结果<span class="arrow">▶</span></div><div class="tool-body">${escHtml(m.result)}</div></div>`;
    case 'error':
      return `<div class="msg ai" style="border-color:var(--red);color:var(--red)">❌ ${escHtml(m.text)}</div>`;
    default:
      return '';
  }
}

// 事件委托：点击 tool-header 展开/收起（监听在父容器上，不受 innerHTML 重建影响）
document.getElementById('messages').addEventListener('click', function(e) {
  const header = e.target.closest('[data-toggle]');
  if (!header) return;
  header.classList.toggle('expanded');
  const body = header.nextElementSibling;
  if (body) body.classList.toggle('show');
});

function formatText(text) {
  // 简单 markdown: 代码块、行内代码、换行
  return text
    .replace(/```(\w*)\n([\s\S]*?)```/g, (_, lang, code) => `<pre><code>${escHtml(code.trim())}</code></pre>`)
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
}

function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ---- 发送消息 ----

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || !currentSession || sending) return;

  sending = true;
  document.getElementById('sendBtn').disabled = true;
  input.value = '';
  autoResize(input);

  // 添加用户消息
  currentSession.messages.push({ type: 'user', text });

  // 首条消息时更新标题
  if (currentSession.messages.length === 1) {
    currentSession.title = text.slice(0, 30) + (text.length > 30 ? '...' : '');
    renderSessions();
  }

  renderMessages();
  saveSessions();

  // 添加 thinking 指示
  const msgEl = document.getElementById('messages');
  const thinkEl = document.createElement('div');
  thinkEl.className = 'thinking';
  thinkEl.id = 'thinking';
  thinkEl.innerHTML = '<div class="spinner"></div> 思考中...';
  msgEl.appendChild(thinkEl);
  msgEl.scrollTop = msgEl.scrollHeight;

  try {
    const resp = await fetch(API + '/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ session_id: currentSession.id, message: text }),
    });

    if (!resp.ok) {
      throw new Error(`HTTP ${resp.status}: ${await resp.text()}`);
    }

    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n');
      buffer = lines.pop() || '';

      for (const line of lines) {
        if (line.startsWith('data:')) {
          const dataStr = line.slice(5).trim();
          if (!dataStr) continue;
          try {
            const event = JSON.parse(dataStr);
            handleEvent(event);
          } catch (e) {
            // 忽略解析错误
          }
        }
      }
    }
  } catch (e) {
    currentSession.messages.push({ type: 'error', text: e.message });
  }

  // 清除 thinking 指示器和临时 thinking 消息
  const t = document.getElementById('thinking');
  if (t) t.remove();
  currentSession.messages = currentSession.messages.filter(m => m.type !== 'thinking');

  renderMessages();
  saveSessions();
  sending = false;
  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function handleEvent(event) {
  const t = document.getElementById('thinking');
  const msgEl = document.getElementById('messages');

  switch (event.type) {
    case 'thinking':
      currentSession.messages.push({ type: 'thinking', step: event.data?.step || '思考中' });
      if (t) t.innerHTML = `<div class="spinner"></div> ${escHtml(event.data?.step || '思考中...')}`;
      renderMessages();
      if (t) msgEl.appendChild(t);
      msgEl.scrollTop = msgEl.scrollHeight;
      break;
    case 'tool_call':
      currentSession.messages.push({ type: 'tool_call', name: event.data?.name, args: event.data?.args });
      if (t) t.innerHTML = `<div class="spinner"></div> 执行 ${escHtml(event.data?.name)}...`;
      renderMessages();
      if (t) msgEl.appendChild(t);
      msgEl.scrollTop = msgEl.scrollHeight;
      break;
    case 'tool_result':
      currentSession.messages.push({ type: 'tool_result', name: event.data?.name, result: event.data?.result });
      renderMessages();
      if (t) msgEl.appendChild(t);
      msgEl.scrollTop = msgEl.scrollHeight;
      break;
    case 'message':
      currentSession.messages.push({ type: 'message', text: event.data?.content });
      renderMessages();
      msgEl.scrollTop = msgEl.scrollHeight;
      break;
    case 'error':
      currentSession.messages.push({ type: 'error', text: event.data?.error });
      renderMessages();
      break;
    case 'done':
      break;
  }
}

// ---- 输入框自适应高度 ----

const input = document.getElementById('input');

input.addEventListener('input', () => autoResize(input));
input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
});

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

// ---- 初始化 ----

renderSessions();
if (sessions.length > 0) {
  switchSession(sessions[0].id);
} else {
  newSession();
}
</script>
</body>
</html>
